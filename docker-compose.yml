services:
  db:
    image: mariadb:11.2
    container_name: moodle_db
    restart: unless-stopped
    env_file: .env
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - moodle-network

  moodle:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MOODLE_VERSION: 404
    container_name: moodle_app
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - db
    environment:
      # Database connection
      MOODLE_DB_HOST: ${MOODLE_DB_HOST:-db}
      MOODLE_DB_NAME: ${MYSQL_DATABASE}
      MOODLE_DB_USER: ${MYSQL_USER}
      MOODLE_DB_PASS: ${MYSQL_PASSWORD}
      
      # Site configuration
      MOODLE_WEB_HOST: ${MOODLE_WEB_HOST:-localhost:8080}
      MOODLE_SITE_FULLNAME: ${MOODLE_SITE_FULLNAME:-English Classes Academy}
      MOODLE_SITE_SHORTNAME: ${MOODLE_SITE_SHORTNAME:-English Academy}
      MOODLE_LANG: ${MOODLE_LANG:-en}
      
      # Admin user
      MOODLE_ADMIN_USER: ${MOODLE_ADMIN_USER:-admin}
      MOODLE_ADMIN_PASS: ${MOODLE_ADMIN_PASS:-Admin123!}
      MOODLE_ADMIN_EMAIL: ${MOODLE_ADMIN_EMAIL:-admin@example.com}
    volumes:
      - moodle_data:/var/www/html
      - moodledata_data:/var/www/moodledata
      
      # Custom theme
      - ./theme:/var/www/html/theme/englishacademy
    networks:
      - moodle-network

volumes:
  db_data:
    driver: local
  moodle_data:
    driver: local
  moodledata_data:
    driver: local

networks:
  moodle-network:
    driver: bridge
